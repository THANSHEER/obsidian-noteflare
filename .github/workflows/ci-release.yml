name: CI & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci || npm install
        
      - name: Run Unit Tests
        run: npm test

      - name: Run Build (Obsidian check)
        run: npm run build

  release:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Check for version bump
        id: check
        run: |
          # Read version from Obsidian manifest.json
          VERSION=$(node -p "require('./manifest.json').version")
          echo "Current manifest version: $VERSION"
          
          # Check if tag already exists on remote
          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "Tag ${VERSION} already exists. Skipping release."
            echo "bump=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected: ${VERSION}. Triggering release!"
            echo "bump=true" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.bump == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        if: steps.check.outputs.bump == 'true'
        run: npm ci || npm install
        
      - name: Build plugin assets
        if: steps.check.outputs.bump == 'true'
        run: npm run build

      - name: Attest Build Provenance
        if: steps.check.outputs.bump == 'true'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub Release
        if: steps.check.outputs.bump == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.version }}
          name: ${{ steps.check.outputs.version }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
